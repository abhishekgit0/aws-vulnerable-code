version: 0.2
env:
    secrets-manager:
      TOKEN: "Sonarcloud_token:tokenForSonar"
phases:
  install:
    runtime-versions:
      java: latest
  build:
    commands:

#Static Application Security Scan (SAST scan) using SonarCloud
     - mvn verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.host.url="https://sonarcloud.io" -Dsonar.organization=javaprojectawskr -Dsonar.projectKey=javaprojectawskr_javaprojectaws -Dsonar.token=$TOKEN

#Quality Gates for Static Application Security Scan(SAST) using SonarCloud

     - sleep 5
     - |- 
        quality_status=$(curl -s -u $TOKEN: https://sonarcloud.io/api/qualitygates/project_status?projectKey=javaprojectaws | jq -r '.projectStatus.status')
        echo "SonarCloud analysistatus is $quality_status"; 
#        if [ $quality_status = "ERROR" ] ; then exit 1;fi

#Software Composition Analysis Scan (SCA scan) using Snyk

     - |-
          apt-get update
          apt-get -y install maven 
          SNYK_TOKEN=snyk_uat.1fcad39e.eyJlIjoxNzkwNjI3MjY3LCJoIjoic255ay5pbyIsImoiOiJBWjhhTjg3Rmo3RWo3STdENGJLNHlRIiwicyI6InVnazRVNFFkUXQtVG9BQTYxMGJVWEEiLCJ0aWQiOiJBQUFBQUFBQUFBQUFBQUFBQUFBQUFBIn0.jWu6ESXsViWkgTaeKwwl9DY6F1PMX_0qQT5R7DAko2N6svLe2ZlvvfIhQ-QnbHos1mq2HszkgPsPBxwIrVAAAg
          export SNYK_TOKEN
          mvn snyk:test -fn 

#Dynamic Application Security Scan (DAST scan) using OWASP ZAP

     - |-
        apt-get update
        apt-get -y install wget
        apt-get -y install default-jdk
        wget https://github.com/zaproxy/zaproxy/releases/download/v2.16.0/ZAP_2.16.0_Linux.tar.gz
        tar -xvf ZAP_2.16.0_Linux.tar.gz
        cd ZAP_2.16.0
        ./zap.sh -cmd -quickurl https://www.example.com -quickprogress -quickout ../zap_report.html 
        
#Storing DAST Reports in S3 bucket

artifacts:
  files:
    - zap_report.html
