version: 0.2

env:
  secrets-manager:
    TOKEN: "Sonarcloud_token:tokenForSonar"
    
phases:
  build:
    commands:
      - echo Building application...
      - echo $TOKEN
      - mvn verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.host.url="https://sonarcloud.io" -Dsonar.organization=javaprojectawskr -Dsonar.projectKey=javaprojectawskr_javaprojectaws -Dsonar.token=$TOKEN
      - |-
        quality_status=$(curl -s -u $TOKEN: https://sonarcloud.io/api/qualitygates/project_status?projectKey=javaprojectawskr_javaprojectaws | jq -r '.projectStatus.status')
        echo "SonarCloud analysistatus is $quality_status";
        if [ $quality_status = "ERROR" ] ; then exit 1;fi
